name: Build DmeX Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./music-player-ui 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf
        working-directory: /

      - name: Install Frontend Dependencies
        run: npm install

      - name: Initialize Android Scaffolding
        run: npx @tauri-apps/cli android init

      - name: Build Android APK (Unsigned Release)
        run: npx @tauri-apps/cli android build

      # --- PRODUCTION SECURITY STEPS ---
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > dmex-release-key.jks

      - name: Zipalign and Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # Find the latest Android build tools installed on the cloud server
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)
          
          # 1. Zipalign the APK (Android requires this memory optimization before signing)
          $BUILD_TOOLS/zipalign -p 4 src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk app-aligned.apk

          # 2. Cryptographically Sign the APK using your Secrets
          $BUILD_TOOLS/apksigner sign --ks dmex-release-key.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "env:KEYSTORE_PASSWORD" \
            --key-pass "env:KEY_PASSWORD" \
            app-aligned.apk

          # 3. Overwrite with the final Signed APK name so the Artifact Uploader finds it
          mv app-aligned.apk src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DmeX-Production-APK
          path: music-player-ui/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
