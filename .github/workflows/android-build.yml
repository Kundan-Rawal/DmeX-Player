name: Build DmeX Android APK

on:
  workflow_dispatch:

# FIX: Force GitHub's runner to use the modern Node 24 runtime to prevent deprecation crashes
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./music-player-ui 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # FIX: Upgraded from 20 to 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf
        working-directory: /

      - name: Install Frontend Dependencies
        run: npm install

      - name: Initialize Android Scaffolding
        run: npx @tauri-apps/cli android init

      # --- PRODUCTION SECURITY STEPS ---
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > dmex-release-key.jks

      - name: Build Android APK (Signed Release)
        env:
          # This tells Tauri to use the Keystore we just decoded, along with your GitHub Secrets
          TAURI_ANDROID_KEYSTORE: ${{ github.workspace }}/music-player-ui/dmex-release-key.jks
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: npx @tauri-apps/cli android build

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DmeX-Production-APK
          # FIX: We are now grabbing the signed version, not the "-unsigned" version
          path: music-player-ui/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
