name: Build DmeX Android APK

on:
  workflow_dispatch:

# FIX: Force GitHub's runner to use the modern Node 24 runtime to prevent deprecation crashes
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./music-player-ui 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # FIX: Upgraded from 20 to 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf
        working-directory: /

      - name: Install Frontend Dependencies
        run: npm install

      - name: Initialize Android Scaffolding
        run: npx @tauri-apps/cli android init

      - name: Build Android APK
        run: npx @tauri-apps/cli android build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DmeX-Android-APK
          path: music-player-ui/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
