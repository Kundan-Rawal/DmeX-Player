name: Build DmeX Android APK

on:
  workflow_dispatch: # This allows you to click a button on GitHub to trigger the build

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Install the specific cross-compilation targets for Android phones
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Android APK
        run: npm run tauri android build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DmeX-Android-APK
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
